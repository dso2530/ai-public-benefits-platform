name: Security

on:
  push:
    branches:
      - main

  pull_request:

jobs:

  security:

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - name: Trivy Scan
        uses: aquasecurity/trivy-action@0.28.0

        with:
          scan-type: fs
          severity: HIGH,CRITICAL
          exit-code: 1
      - run: mvn dependency-check:check