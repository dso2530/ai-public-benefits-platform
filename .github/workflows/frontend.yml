name: Frontend

on:
  pull_request:
    paths:
      - 'frontend/portal-web/**'
  push:
    branches: [main]
    paths:
      - 'frontend/portal-web/**'

jobs:
  frontend:

    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend/portal-web

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - run: npm ci
      - run: npm run lint
      - run: npm run build