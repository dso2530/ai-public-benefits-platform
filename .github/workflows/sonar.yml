name: Sonar

on:
  push:
    branches:
      - main

  pull_request:

jobs:  

  sonar-core:

    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend/core-services

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - run: |
          mvn clean verify sonar:sonar \
          -Dsonar.token=${{ secrets.SONAR_TOKEN }}

  sonar-bff:

    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: bff/citizen-bff

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Sonar Scan
        run: |
          mvn clean verify sonar:sonar \
          -Dsonar.token=${{ secrets.SONAR_TOKEN }}