name: Sonar-BFF

on:
  push:
    branches:
      - main
    paths:
      - 'bff/citizen-bff/**'
     

  pull_request:
    paths:
      - 'bff/citizen-bff/**'
    
        

jobs:  

  sonar-bff:

    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: bff/citizen-bff

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - run: |
          mvn clean verify sonar:sonar \
          -Dsonar.host.url=${{ secrets.SONAR_HOST_URL }} \
          -Dsonar.token=${{ secrets.SONAR_TOKEN }}

      - name: Quality Gate
        uses: sonarsource/sonarqube-quality-gate-action@master
        with:
         scanMetadataReportFile: bff/citizen-bff/.scannerwork/report-task.txt
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}