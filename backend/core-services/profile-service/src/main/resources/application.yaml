server:
  port: 8081

spring:
  application:
    name: profile-service

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/profiledb}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}

  jpa:
    hibernate:
      ddl-auto: update # validate avec Flyway
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  jackson:
    deserialization:
      fail-on-unknown-properties: false

security:
  jwt:
    secret: ${JWT_SECRET:my-super-secret-key-for-local-development-at-least-48-chars-long}

minio:
  enabled: false

kafka:
  enabled: true

messaging:
  kafka:
    bootstrap-servers: ${KAFKA_BRK:localhost:9092}
    schema-registry-url: ${SCHEMA_REGISTRY_URL:http://localhost:8091/apis/ccompat/v7}
    group-id: profile-service-v3
    auto-offset-reset: earliest

logging:
  level:
    org.springframework.security: DEBUG
    org.springframework.security.oauth2: DEBUG
    org.springframework.security.oauth2.server.resource: DEBUG
    org.springframework.security.web: DEBUG

    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE

    org.springframework.boot.context.config: DEBUG
