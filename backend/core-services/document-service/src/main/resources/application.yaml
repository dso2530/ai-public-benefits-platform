server:
  port: 8085

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always

  tracing:
    sampling:
      probability: 1.0
  

  otlp:
    tracing:
      endpoint: http://jaeger:4317

spring:
  application:
    name: document-service

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/documentdb}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

    properties:
      hibernate:
        format_sql: true

security:
  jwt:
    secret: ${JWT_SECRET:my-super-secret-key-for-local-development-at-least-32-chars}

documents:
  storage-path: ./storage/documents

logging:
  level:
    org.springframework.security: DEBUG # Logs globaux de Spring Security
    org.springframework.security.oauth2: DEBUG # Logs OAuth2 (JWT, Resource Server, etc.)
    org.springframework.security.web: DEBUG # Logs des requêtes HTTP et filtres
    org.springframework.boot.context.config: DEBUG # Logs de configuration (optionnel)
