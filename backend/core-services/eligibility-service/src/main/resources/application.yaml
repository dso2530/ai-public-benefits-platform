server:
  port: 8082

spring:
  application:
    name: eligibility-service

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/eligibilitydb}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}

  jpa:
    hibernate:
      ddl-auto: update

    show-sql: true

    properties:
      hibernate:
        format_sql: true

security:
  jwt:
    secret: ${JWT_SECRET:my-super-secret-key-for-local-development-at-least-48-chars-long}

minio:
  enabled: false

kafka:
  enabled: true

messaging:
  kafka:
    bootstrap-servers: ${KAFKA_BRK:localhost:9092}
    schema-registry-url: ${SCHEMA_REGISTRY_URL:http://localhost:8091/apis/ccompat/v7}
    group-id: eligibility-service-v4
    auto-offset-reset: earliest

eligibility:
  rsa:
    max-income: 12000
    estimated-amount: "635.71 €/mois"
  prime-activite:
    income-ceiling: 20000
    estimated-amount: "À partir de 200 €/mois"
  apl:
    income-ceiling: 30000
    estimated-amount: "Entre 150 € et 350 € / mois"

clients:
  profile:
    base-url: ${PROFILE_SERVICE:http://localhost:8081}

logging:
  level:
    org.springframework.security: DEBUG # Logs globaux de Spring Security
    org.springframework.security.oauth2: DEBUG # Logs OAuth2 (JWT, Resource Server, etc.)
    org.springframework.security.web: DEBUG # Logs des requêtes HTTP et filtres
    org.springframework.boot.context.config: DEBUG # Logs de configuration (optionnel)
