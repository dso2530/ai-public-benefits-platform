global:
  scrape_interval: 15s

scrape_configs:
  - job_name: citizen-bff
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["host.docker.internal:8084"]

  - job_name: document-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["document-service:8085"]
