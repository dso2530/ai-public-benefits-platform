services:

  postgres:
    image: docker.io/postgres:17

    container_name: postgres

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5432:5432"

    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres:/docker-entrypoint-initdb.d

  keycloak:
    image: quay.io/keycloak/keycloak:26.2

    container_name: keycloak

    command:
      - start-dev
      - --import-realm

    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin

    ports:
      - "9090:8080"

    volumes:
      - ./keycloak/govtech-realm.json:/opt/keycloak/data/import/realm-export.json

    depends_on:
      - postgres

  profile-service:

    build:
      context: ../../backend/core-services
      dockerfile: profile-service/Dockerfile
    container_name: profile-service

    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/profiledb
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres

    ports:
      - "8081:8081"
    depends_on:
      - postgres

  eligibility-service:
    build:
      context: ../../backend/core-services
      dockerfile: eligibility-service/Dockerfile
    container_name: eligibility-service
    ports:
      - "8082:8082"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/eligibilitydb
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
    depends_on:
      - postgres

  notification-service:
    build:
      context: ../../backend/core-services
      dockerfile: notification-service/Dockerfile
    container_name: notification-service
    ports:
      - "8083:8083"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/notificationdb
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
    depends_on:
      - postgres

  document-service:
    build:
      context: ../../backend/core-services
      dockerfile: document-service/Dockerfile
    container_name: document-service
    ports:
      - "8085:8085"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/documentdb
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
    depends_on:
      - postgres

  
  citizen-bff:
    build:
      context: ../../bff/citizen-bff
      dockerfile: Dockerfile
    container_name: citizen-bff
    ports:
      - "8084:8084"
    environment:
      SERVICES_PROFILE_URL: http://profile-service:8081
      SERVICES_ELIGIBILITY_URL: http://eligibility-service:8082
      SERVICES_NOTIFICATION_URL: http://notification-service:8083
      SERVICES_DOCUMENT_URL: http://document-service:8085
      SERVICES_IDENTITY_URL: http://identity-service:8086
      JWT_SECRET: my-super-secret-key-for-local-development-at-least-32-chars
    depends_on:
      - profile-service
      - eligibility-service
      - notification-service
      - document-service

  prometheus:
    image: prom/prometheus
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
    - "9099:9090"
    volumes:
    - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
  grafana:
   image: grafana/grafana
   ports:
    - "3001:3000"
   depends_on:
    - prometheus

  jaeger:
   image: jaegertracing/all-in-one:latest
   ports:
    - "16686:16686"
    - "4317:4317"
    - "4318:4318"

  loki:
   image: grafana/loki:3.5.2
   ports:
    - "3100:3100"
   command: -config.file=/etc/loki/local-config.yaml


  promtail:
   image: grafana/promtail:3.5.2
   ports:
    - "9080:9080"
   volumes:
    - /var/log/citizen-bff:/logs/citizen-bff:ro
    #- ./var/log/document-service/logs:/logs/document-service:ro
    #- /var/log/notification-service/logs:/logs/notification-service:ro
    - ./grafana/promtail-config.yml:/etc/promtail/config.yml:ro
   command: -config.file=/etc/promtail/config.yml

volumes:
  postgres-data: