services:

  postgres:
    image: docker.io/postgres:17

    container_name: postgres

    environment:
      POSTGRES_DB: profiledb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5432:5432"

    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/postgres:/docker-entrypoint-initdb.d

  keycloak:
    image: quay.io/keycloak/keycloak:26.2

    container_name: keycloak

    command:
      - start-dev
      - --import-realm

    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin

    ports:
      - "9090:8080"

    volumes:
      - ./keycloak/govtech-realm.json:/opt/keycloak/data/import/realm-export.json

    depends_on:
      - postgres

  profile-service:

    build:
      context: ../../backend/core-services
      dockerfile: profile-service/Dockerfile
    container_name: profile-service

    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/profiledb
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: http://keycloak:8080/realms/govtech  

    ports:
      - "8081:8081"
    depends_on:
      - postgres

  eligibility-service:
    build:
      context: ../../backend/core-services
      dockerfile: eligibility-service/Dockerfile
    container_name: eligibility-service
    ports:
      - "8082:8082"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/eligibilitydb
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
    depends_on:
      - postgres

  notification-service:
    build:
      context: ../../backend/core-services
      dockerfile: notification-service/Dockerfile
    container_name: notification-service
    ports:
      - "8083:8083"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/notificationdb
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
    depends_on:
      - postgres

  document-service:
    build:
      context: ../../backend/core-services
      dockerfile: document-service/Dockerfile
    container_name: document-service
    ports:
      - "8085:8085"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/documentdb
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
    depends_on:
      - postgres
volumes:
  postgres-data: