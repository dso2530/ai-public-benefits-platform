services:

  postgres:
    image: docker.io/postgres:17

    container_name: postgres

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5432:5432"

    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres:/docker-entrypoint-initdb.d

  minio:
    image: quay.io/minio/minio:latest
    container_name: minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: admin123456
    ports:
      - "9000:9000"   # API S3
      - "9001:9001"   # Console Web
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
  
  keycloak:
    image: quay.io/keycloak/keycloak:26.2
    container_name: keycloak
    command:
      - start-dev
      - --import-realm
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
    ports:
      - "9090:8080"
    volumes:
      - ./keycloak/govtech-realm.json:/opt/keycloak/data/import/realm-export.json
    depends_on:
      - postgres

  kafka:
    image: apache/kafka:3.7.2
    container_name: kafka
    hostname: kafka

    ports:
      - "9092:9092"
      - "29092:29092"

    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller

      KAFKA_LISTENERS: INTERNAL://:29092,EXTERNAL://:9092,CONTROLLER://:9093

      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:9092

      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT

      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER

      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk


    healthcheck:
      test: ["CMD", "/opt/kafka/bin/kafka-topics.sh", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      timeout: 5s
      retries: 10

  apicurio-registry:
    image: apicurio/apicurio-registry:3.0.7
    container_name: apicurio-registry
    ports:
    - "8091:8080"
    environment:
      APICURIO_STORAGE_KIND: sql
      APICURIO_KAFKA_BOOTSTRAP_SERVERS: kafka:9092

    depends_on:
      kafka:
        condition: service_healthy


  kafka-init:
    image: apache/kafka:3.7.2

    depends_on:
      kafka:
        condition: service_healthy

    entrypoint: >
      sh -c "
      /opt/kafka/bin/kafka-topics.sh
      --bootstrap-server kafka:9092
      --create --if-not-exists
      --topic document.uploaded
      --partitions 3
      --replication-factor 1;
      "

  profile-service:
    build:
      context: ../../backend/core-services
      dockerfile: profile-service/Dockerfile
    container_name: profile-service

    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/profiledb
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres


    ports:
      - "8081:8081"
    depends_on:
      - postgres

  eligibility-service:
    build:
      context: ../../backend/core-services
      dockerfile: eligibility-service/Dockerfile
    container_name: eligibility-service
    ports:
      - "8082:8082"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/eligibilitydb
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
    depends_on:
      - postgres

  notification-service:
    build:
      context: ../../backend/core-services
      dockerfile: notification-service/Dockerfile
    container_name: notification-service
    ports:
      - "8083:8083"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/notificationdb
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
    depends_on:
      - postgres

  document-service:
    build:
      context: ../../backend
      dockerfile: core-services/document-service/Dockerfile
    container_name: document-service
    ports:
      - "8085:8085"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/documentdb
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      
      STORAGE_ENDPOINT: http://minio:9000
      STORAGE_ACCESS_KEY: admin
      STORAGE_SECRET_KEY: admin123456
      STORAGE_BUCKET: documents

      KAFKA_BRK: kafka:29092
      SCHEMA_REGISTRY_URL: http://apicurio-registry:8080/apis/ccompat/v7



    depends_on:
      - postgres
      - minio

    

  prometheus:
    image: prom/prometheus
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
    - "9099:9090"
    volumes:
    - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
  grafana:
   image: grafana/grafana
   ports:
    - "3001:3000"
   depends_on:
    - prometheus

  jaeger:
   image: jaegertracing/all-in-one:latest
   ports:
    - "16686:16686"
    - "4317:4317"
    - "4318:4318"

  loki:
   image: grafana/loki:3.5.2
   ports:
    - "3100:3100"
   command: -config.file=/etc/loki/local-config.yaml


  promtail:
   image: grafana/promtail:3.5.2
   ports:
    - "9080:9080"
   volumes:
    - /var/log/citizen-bff:/logs/citizen-bff:ro
    #- ./var/log/document-service/logs:/logs/document-service:ro
    #- /var/log/notification-service/logs:/logs/notification-service:ro
    - ./grafana/promtail-config.yml:/etc/promtail/config.yml:ro
   command: -config.file=/etc/promtail/config.yml

volumes:
  postgres-data:
  minio-data: